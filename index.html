```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漢字読みクイズ</title>

<style>
body{
  font-family:sans-serif;
  text-align:center;
  padding:20px;
  background:linear-gradient(135deg,#fdfbfb,#ebedee);
}

.container{
  background:white;
  padding:25px;
  border-radius:15px;
  max-width:420px;
  margin:auto;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.question{
  font-size:18px;
  margin:8px 0;
}

input{
  width:90%;
  padding:10px;
  margin:6px 0 12px 0;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:16px;
}

button{
  padding:12px 25px;
  background:#ff6b6b;
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}

.result{
  margin-top:20px;
  font-size:18px;
  font-weight:bold;
}

.correct-list{
  margin-top:10px;
  font-size:14px;
  color:#555;
}

/* 満点画面 */

.perfect-screen{
  display:none;
  text-align:center;
  padding:40px;
}

.perfect-title{
  font-size:40px;
  font-weight:bold;
  color:#ff4d6d;
  margin-bottom:20px;
}

.perfect-text{
  font-size:20px;
}

.confetti{
  font-size:30px;
  animation:pop 0.6s infinite alternate;
}

@keyframes pop{
  from{transform:scale(1);}
  to{transform:scale(1.2);}
}
</style>
</head>

<body>

<div class="container" id="quiz">

<h2>📚 漢字読みクイズ</h2>
<p>次の漢字の読みを入力してください</p>

<div class="question">① 漸次</div>
<input type="text" id="a1">

<div class="question">② 苦汁</div>
<input type="text" id="a2">

<div class="question">③ 包括</div>
<input type="text" id="a3">

<div class="question">④ 追従</div>
<input type="text" id="a4">

<div class="question">⑤ 便宜</div>
<input type="text" id="a5">

<br>
<button onclick="checkAnswers()">送信</button>

<div class="result" id="result"></div>
<div class="correct-list" id="correctList"></div>

</div>


<!-- 満点専用画面 -->

<div class="perfect-screen" id="perfect">

<div class="confetti">🎉🎉🎉</div>

<div class="perfect-title">
全問正解！！
</div>

<div class="perfect-text">
おめでとうございます！<br>
あなたは漢字マスターです🏆
</div>

<br>
<div class="confetti">🎊🎊🎊</div>

</div>


<script>

const correctAnswers=[
"ぜんじ",
"くじゅう",
"ほうかつ",
"ついしょう",
"べんぎ"
];

function toHiragana(str){
return str.replace(/[ァ-ン]/g,function(s){
return String.fromCharCode(s.charCodeAt(0)-0x60);
});
}

function checkAnswers(){

let userAnswers=[
document.getElementById("a1").value,
document.getElementById("a2").value,
document.getElementById("a3").value,
document.getElementById("a4").value,
document.getElementById("a5").value
];

let score=0;

userAnswers.forEach((ans,index)=>{

ans=ans.trim().toLowerCase();
ans=toHiragana(ans);

if(ans===correctAnswers[index]){
score++;
}

});

if(score===5){

document.getElementById("quiz").style.display="none";
document.getElementById("perfect").style.display="block";

}else{

document.getElementById("result").innerHTML=
"あなたの点数は "+score+" / 5 点です";

document.getElementById("correctList").innerHTML=
"正解：①ぜんじ　②くじゅう　③ほうかつ　④ついしょう　⑤べんぎ";

}

}

</script>

</body>
</html>
```
